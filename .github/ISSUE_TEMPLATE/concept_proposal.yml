name: Concept Proposal
description: Propose a change to Navo's core concepts or philosophy.
title: "[Concept]: "
labels:
  - design
  - discussion

body:
  - type: textarea
    id: concept
    attributes:
      label: Concept
      description: Describe the idea clearly.
      placeholder: Describe the concept or design proposal...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why should this concept exist?
      placeholder: What problem does this solve?

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Which documents, concepts, or specifications would be affected?
      placeholder: |
        - Vision
        - Mental Model
        - Architecture
        - Specification
        - Implementation

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Provide real-world examples or use cases.
      placeholder: Describe one or more scenarios where this concept would be valuable.

name: Bug Report
description: Report incorrect or unexpected behavior.
title: "[Bug]: "
labels:
  - bug

body:
  - type: textarea
    id: description
    attributes:
    label: What happened?
    validations:
    required: true

  - type: textarea
    id: expected
    attributes:
    label: What did you expect?

  - type: textarea
    id: steps
    attributes:
    label: Steps to reproduce

  - type: textarea
    id: environment
    attributes:
    label: Environment

  - type: textarea
    id: additional
    attributes:
    label: Additional context
